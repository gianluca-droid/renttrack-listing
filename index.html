<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#080E1C"/>
<meta name="description" content="RentTrack — L'app italiana per gestire affitti, inquilini e cedolini. Gratis su Android."/>
<title>RentTrack — Gestione Affitti Semplice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080E1C;--surface:#0F1C33;--card:#112240;--border:#1A3050;
  --cyan:#00C8FF;--cyan-soft:#67E8F9;--purple:#7C5CFC;--green:#00D48C;
  --text:#F0F6FF;--muted:#64748B;--sub:#94A3B8;
}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
.hidden{display:none!important}

/* ── LOADER ── */
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:14px}
.spinner{width:44px;height:44px;border:3px solid #1E3A5F;border-top:3px solid var(--cyan);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-text{color:var(--muted);font-size:14px;font-weight:500}

/* ── LIGHTBOX ── */
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:9999;align-items:center;justify-content:center;padding:16px}
#lightbox.open{display:flex}
#lightbox img{max-width:100%;max-height:90vh;object-fit:contain;border-radius:12px}
#lightbox-close{position:absolute;top:20px;right:24px;font-size:28px;color:#fff;cursor:pointer;width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.1);border-radius:50%;backdrop-filter:blur(8px)}

/* ══════════════════════════════════════════
   LISTING PAGE STYLES
══════════════════════════════════════════ */
.l-hero{position:relative;width:100%;height:300px;overflow:hidden;background:linear-gradient(135deg,#0D1B35,#122040)}
.l-hero img{width:100%;height:100%;object-fit:cover}
.l-hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(8,14,28,.2) 0%,rgba(8,14,28,.9) 100%)}
.l-hero-placeholder{width:100%;height:260px;display:flex;align-items:center;justify-content:center;font-size:80px;background:linear-gradient(135deg,#0D1B35,#122040)}
.photo-badge{position:absolute;bottom:16px;right:16px;background:rgba(0,0,0,.65);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:600;color:#fff;display:flex;align-items:center;gap:5px}
.l-content{padding:20px 16px 120px;max-width:640px;margin:0 auto}
.l-price{font-size:32px;font-weight:900;background:linear-gradient(135deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-1px;margin-bottom:4px}
.l-title{font-size:22px;font-weight:800;color:var(--text);line-height:1.3;margin-bottom:8px}
.l-location{color:var(--sub);font-size:14px;margin-bottom:4px;display:flex;align-items:center;gap:5px}
.l-avail{font-size:13px;color:var(--sub);margin-bottom:16px}
.l-avail strong{color:var(--green)}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin:14px 0 18px}
.chip{background:var(--card);border:1px solid var(--border);border-radius:99px;padding:5px 13px;font-size:13px;color:#CBD5E1;white-space:nowrap;font-weight:500}
.chip-ok{border-color:rgba(0,212,140,.5);color:var(--green);background:rgba(0,212,140,.08)}
.chip-no{border-color:rgba(248,113,113,.5);color:#F87171;background:rgba(248,113,113,.08)}
.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:18px;border-radius:14px;overflow:hidden}
.gallery img{width:100%;aspect-ratio:1;object-fit:cover;cursor:pointer;transition:opacity .2s,transform .2s}
.gallery img:hover{opacity:.8;transform:scale(1.02)}
.l-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:20px;margin-bottom:12px;animation:fadeUp .4s ease both}
.l-card-title{font-size:14px;font-weight:700;color:var(--cyan-soft);margin-bottom:14px;display:flex;align-items:center;gap:7px;letter-spacing:.3px}
.l-desc{color:#CBD5E1;font-size:14px;line-height:1.75;white-space:pre-wrap}
.l-contacts{display:flex;flex-direction:column;gap:10px}
.l-btn{display:flex;align-items:center;justify-content:center;gap:9px;padding:16px;border-radius:14px;font-size:15px;font-weight:700;transition:transform .15s,box-shadow .15s}
.l-btn:active{transform:scale(.97)}
.l-btn-phone{background:rgba(0,212,140,.1);color:var(--green);border:1px solid rgba(0,212,140,.4)}
.l-btn-phone:hover{background:rgba(0,212,140,.18);box-shadow:0 4px 20px rgba(0,212,140,.2)}
.l-btn-wa{background:rgba(37,211,102,.1);color:#4ADE80;border:1px solid rgba(37,211,102,.4)}
.l-btn-wa:hover{background:rgba(37,211,102,.18);box-shadow:0 4px 20px rgba(37,211,102,.2)}
.l-btn-email{background:rgba(0,200,255,.1);color:var(--cyan);border:1px solid rgba(0,200,255,.3)}
.l-btn-email:hover{background:rgba(0,200,255,.18);box-shadow:0 4px 20px rgba(0,200,255,.2)}
.l-sticky{position:fixed;bottom:0;left:0;right:0;z-index:100;padding:12px 16px 20px;background:linear-gradient(to top,rgba(8,14,28,1) 60%,transparent);display:flex;gap:10px;max-width:640px;margin:0 auto}
.l-sticky-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:15px;border-radius:14px;font-size:14px;font-weight:700;transition:transform .15s}
.l-sticky-btn:active{transform:scale(.97)}
.l-branding{margin-top:8px;padding:20px;background:linear-gradient(135deg,rgba(124,92,252,.08),rgba(0,200,255,.08));border:1px solid rgba(124,92,252,.2);border-radius:18px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px}
.l-brand-logo{font-size:13px;font-weight:700;color:var(--cyan-soft)}
.l-brand-sub{color:var(--muted);font-size:12px}
.l-brand-cta{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;background:linear-gradient(135deg,var(--cyan),var(--purple));color:#fff;border-radius:10px;font-size:13px;font-weight:700;margin-top:4px;transition:transform .15s,box-shadow .15s}
.l-brand-cta:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(124,92,252,.4)}
.l-center{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:32px;gap:16px}
.l-center-icon{font-size:72px;margin-bottom:8px}
.l-center h1{font-size:22px;font-weight:800;color:var(--text)}
.l-center p{color:var(--sub);font-size:15px;max-width:300px;line-height:1.6}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ══════════════════════════════════════════
   LANDING PAGE STYLES
══════════════════════════════════════════ */
.landing{position:relative;min-height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* BG */
.bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:.14}
.orb1{width:560px;height:560px;background:radial-gradient(#6C63FF,transparent);top:-200px;left:-150px;animation:drift1 22s ease-in-out infinite}
.orb2{width:480px;height:480px;background:radial-gradient(#00C8FF,transparent);bottom:-120px;right:-120px;animation:drift2 28s ease-in-out infinite}
.orb3{width:320px;height:320px;background:radial-gradient(#FF6584,transparent);top:45%;left:35%;animation:drift3 16s ease-in-out infinite}
@keyframes drift1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(80px,60px) scale(1.1)}}
@keyframes drift2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-70px,-80px) scale(1.1)}}
@keyframes drift3{0%,100%{transform:translate(0,0)}50%{transform:translate(50px,-50px)}}
.bg-grid{position:fixed;inset:0;z-index:0;opacity:.025;background-image:linear-gradient(rgba(255,255,255,.8) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.8) 1px,transparent 1px);background-size:48px 48px;pointer-events:none}

/* NAV — sticky glass */
.lp-nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;max-width:960px;margin:0 auto;width:100%;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(8,14,28,.75);border-bottom:1px solid rgba(255,255,255,.06)}
.lp-logo{display:flex;align-items:center;gap:10px}
.lp-logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--cyan),var(--purple));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 4px 16px rgba(0,200,255,.25)}
.lp-logo-name{font-size:17px;font-weight:800;color:var(--text);letter-spacing:-.5px}
.lp-nav-cta{padding:8px 18px;background:linear-gradient(135deg,var(--cyan),var(--purple));color:#fff;border-radius:99px;font-size:13px;font-weight:700;transition:transform .15s,box-shadow .15s;white-space:nowrap}
.lp-nav-cta:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(124,92,252,.45)}

/* HERO */
.lp-hero{position:relative;z-index:5;display:flex;flex-direction:column;align-items:center;text-align:center;padding:72px 24px 56px;max-width:680px;margin:0 auto;width:100%}
.lp-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(124,92,252,.1);border:1px solid rgba(124,92,252,.25);border-radius:99px;padding:7px 18px;font-size:12px;font-weight:600;color:#A78BFA;margin-bottom:28px;animation:fadeUp .5s ease .1s both}
.lp-headline{font-size:clamp(34px,9vw,60px);font-weight:900;line-height:1.07;letter-spacing:-2.5px;margin-bottom:22px;animation:fadeUp .5s ease .2s both}
.lp-headline-accent{background:linear-gradient(135deg,var(--cyan) 0%,var(--purple) 60%,#FF6584 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.lp-sub{font-size:18px;color:var(--sub);line-height:1.65;margin-bottom:36px;max-width:520px;animation:fadeUp .5s ease .3s both}
.lp-trust-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center;animation:fadeUp .5s ease .4s both}
.lp-trust-pill{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:99px;padding:6px 14px;font-size:12px;color:var(--sub);font-weight:500;transition:border-color .2s}
.lp-trust-pill:hover{border-color:rgba(0,200,255,.2)}

/* PAIN POINTS */
.lp-problems{position:relative;z-index:5;display:flex;gap:12px;padding:0 24px 64px;max-width:840px;margin:0 auto;width:100%;flex-wrap:wrap;justify-content:center}
.prob-card{flex:1;min-width:190px;background:rgba(17,34,64,.5);border:1px solid rgba(255,255,255,.07);border-radius:18px;padding:22px 18px;text-align:center;backdrop-filter:blur(12px);transition:border-color .2s,transform .2s}
.prob-card:hover{border-color:rgba(124,92,252,.2);transform:translateY(-3px)}
.prob-emoji{font-size:30px;margin-bottom:12px}
.prob-text{font-size:14px;font-weight:600;color:var(--sub);line-height:1.45}

/* FEATURES */
.lp-features{position:relative;z-index:5;padding:0 24px 64px;max-width:960px;margin:0 auto;width:100%}
.lp-section-label{display:flex;align-items:center;justify-content:center;gap:8px;font-size:11px;font-weight:700;color:var(--cyan);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:12px}
.lp-section-title{text-align:center;font-size:clamp(24px,5vw,38px);font-weight:800;letter-spacing:-1px;margin-bottom:10px;line-height:1.15}
.lp-section-sub{text-align:center;color:var(--sub);font-size:15px;margin-bottom:40px;line-height:1.6;max-width:480px;margin-left:auto;margin-right:auto}
.feat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
@media(min-width:640px){.feat-grid{grid-template-columns:repeat(3,1fr)}}
.feat-card{background:rgba(17,34,64,.55);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.06);border-radius:20px;padding:24px 18px;display:flex;flex-direction:column;gap:12px;transition:border-color .25s,transform .25s,box-shadow .25s}
.feat-card:hover{border-color:rgba(0,200,255,.2);transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,.35)}
.feat-icon-wrap{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.feat-card h3{font-size:15px;font-weight:700;color:var(--text);line-height:1.3}
.feat-card p{font-size:13px;color:var(--muted);line-height:1.55}

/* TESTIMONIALS */
.lp-testimonials{position:relative;z-index:5;padding:0 24px 64px;max-width:960px;margin:0 auto;width:100%}
.testi-grid{display:grid;grid-template-columns:1fr;gap:14px;margin-top:36px}
@media(min-width:600px){.testi-grid{grid-template-columns:repeat(3,1fr)}}
.testi-card{background:rgba(17,34,64,.5);border:1px solid rgba(255,255,255,.07);border-radius:20px;padding:24px 20px;display:flex;flex-direction:column;gap:14px;backdrop-filter:blur(12px);transition:border-color .2s,transform .2s}
.testi-card:hover{border-color:rgba(0,200,255,.15);transform:translateY(-2px)}
.testi-stars{color:#FBBF24;font-size:14px;letter-spacing:2px}
.testi-quote{font-size:14px;color:#CBD5E1;line-height:1.65;font-style:italic;flex:1}
.testi-author{font-size:13px;font-weight:700;color:var(--cyan-soft)}
.testi-role{font-size:12px;color:var(--muted);margin-top:2px}

/* PRICING */
.lp-pricing{position:relative;z-index:5;padding:0 24px 64px;max-width:760px;margin:0 auto;width:100%}
.price-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:36px}
@media(max-width:480px){.price-grid{grid-template-columns:1fr}}
.price-card{background:rgba(17,34,64,.6);border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:24px 20px;transition:transform .2s}
.price-card.pro{background:linear-gradient(145deg,rgba(108,99,255,.14),rgba(0,200,255,.08));border-color:rgba(108,99,255,.35);transform:scale(1.02);box-shadow:0 20px 60px rgba(108,99,255,.18)}
.price-card.pro:hover{transform:scale(1.04)}
.price-badge{display:inline-block;padding:4px 12px;border-radius:99px;font-size:11px;font-weight:700;margin-bottom:14px}
.price-badge.free{background:rgba(100,116,139,.15);color:var(--muted)}
.price-badge.pro-badge{background:linear-gradient(135deg,var(--cyan),var(--purple));color:#fff}
.price-name{font-size:22px;font-weight:800;margin-bottom:14px}
.price-options{display:flex;flex-direction:column;gap:8px;margin-bottom:18px}
.price-option{border-radius:12px;padding:12px 14px;border:1px solid rgba(255,255,255,.08);transition:border-color .2s,background .2s}
.price-option.monthly{background:rgba(255,255,255,.03)}
.price-option.annual{background:linear-gradient(135deg,rgba(0,200,255,.08),rgba(124,92,252,.08));border-color:rgba(0,200,255,.28)}
.po-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.po-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.po-save{font-size:10px;font-weight:700;color:var(--green);background:rgba(0,212,140,.12);border-radius:99px;padding:2px 8px}
.po-price{font-size:22px;font-weight:900;letter-spacing:-.5px}
.po-price span{font-size:13px;font-weight:500;color:var(--muted)}
.po-sub{font-size:11px;color:var(--muted);margin-top:2px}
.price-amount{font-size:32px;font-weight:900;letter-spacing:-1px;margin-bottom:16px}
.price-amount span{font-size:14px;font-weight:500;color:var(--muted)}
.price-features{display:flex;flex-direction:column;gap:9px}
.pf-item{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--sub)}
.pf-item .pf-check{color:var(--green);font-size:14px;flex-shrink:0}
.pf-item .pf-x{color:var(--muted);font-size:14px;flex-shrink:0}
.pf-item.pf-yes{color:#CBD5E1}

/* FAQ */
.lp-faq{position:relative;z-index:5;padding:0 24px 64px;max-width:680px;margin:0 auto;width:100%}
.faq-list{margin-top:36px;display:flex;flex-direction:column;gap:10px}
.faq-item{background:rgba(17,34,64,.5);border:1px solid rgba(255,255,255,.07);border-radius:16px;overflow:hidden;cursor:pointer;transition:border-color .2s}
.faq-item:hover{border-color:rgba(0,200,255,.2)}
.faq-q{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;font-size:15px;font-weight:600;color:var(--text);gap:12px;user-select:none}
.faq-arrow{font-size:20px;color:var(--cyan);transition:transform .25s;flex-shrink:0;line-height:1}
.faq-item.open .faq-arrow{transform:rotate(45deg)}
.faq-a{max-height:0;overflow:hidden;transition:max-height .35s ease}
.faq-item.open .faq-a{max-height:200px}
.faq-a-inner{padding:0 20px 18px;font-size:14px;color:var(--sub);line-height:1.65}

/* FINAL CTA */
.lp-final-cta{position:relative;z-index:5;padding:0 24px 64px;text-align:center;max-width:560px;margin:0 auto;width:100%}
.lp-btn-primary{position:relative;display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:18px 36px;background:linear-gradient(135deg,#0EA5E9,#6C63FF,#8B5CF6);color:#fff;border-radius:16px;font-size:16px;font-weight:800;box-shadow:0 8px 36px rgba(108,99,255,.45);transition:transform .2s,box-shadow .2s;overflow:hidden}
.lp-btn-primary::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);transform:translateX(-100%);animation:shimmer 2.5s ease-in-out infinite 1s}
@keyframes shimmer{to{transform:translateX(100%)}}
.lp-btn-primary:hover{transform:translateY(-3px);box-shadow:0 14px 48px rgba(108,99,255,.55)}
.lp-btn-primary:active{transform:scale(.98)}

/* STATS BAR */
.lp-stats{position:relative;z-index:5;display:flex;align-items:stretch;justify-content:center;gap:0;padding:0 24px 64px;max-width:760px;margin:0 auto;width:100%}
.stat-item{flex:1;text-align:center;padding:20px 12px;border:1px solid rgba(255,255,255,.07);background:rgba(17,34,64,.45);backdrop-filter:blur(12px);transition:background .2s}
.stat-item:first-child{border-radius:16px 0 0 16px}
.stat-item:last-child{border-radius:0 16px 16px 0}
.stat-item:not(:first-child){border-left:none}
.stat-num{font-size:clamp(22px,5vw,30px);font-weight:900;letter-spacing:-1px;background:linear-gradient(135deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-label{font-size:11px;color:var(--muted);margin-top:4px;font-weight:500;line-height:1.4}
@media(max-width:480px){.lp-stats{flex-wrap:wrap}.stat-item{min-width:calc(50% - 1px)}.stat-item:first-child{border-radius:16px 0 0 0}.stat-item:nth-child(2){border-radius:0 16px 0 0;border-left:1px solid rgba(255,255,255,.07)}.stat-item:nth-child(3){border-radius:0 0 0 16px;border-top:none}.stat-item:last-child{border-radius:0 0 16px 0;border-top:none;border-left:1px solid rgba(255,255,255,.07)}}

/* PRICING VALUE ANCHOR */
.price-anchor{text-align:center;margin-top:16px;font-size:13px;color:var(--muted)}
.price-anchor strong{color:var(--green)}

/* FOOTER */
.lp-footer{position:relative;z-index:5;text-align:center;padding:28px 24px;color:var(--muted);font-size:12px;border-top:1px solid rgba(255,255,255,.05)}
.lp-footer a{color:#475569;text-decoration:underline}
.lp-footer-links{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:10px;flex-wrap:wrap}

/* ANIMATIONS */
.anim-reveal{opacity:0;transform:translateY(28px);transition:opacity .65s ease,transform .65s ease}
.anim-reveal.visible{opacity:1;transform:translateY(0)}

/* ── DESKTOP ENHANCEMENTS ── */
@media(min-width:900px){
  .lp-hero{flex-direction:row;text-align:left;align-items:center;justify-content:space-between;max-width:960px;padding:80px 40px 64px;gap:48px}
  .lp-hero-text{flex:1;display:flex;flex-direction:column;align-items:flex-start}
  .lp-hero-visual{flex:0 0 340px;display:flex;flex-direction:column;gap:12px}
  .lp-badge{margin-bottom:20px}
  .lp-headline{font-size:clamp(42px,4.5vw,62px);margin-bottom:20px}
  .lp-sub{font-size:18px;text-align:left;max-width:460px}
  .lp-trust-row{justify-content:flex-start}
  .lp-problems{max-width:960px}

<script>
const SUPABASE_URL = "https://zjqrtuposdrimzjoydgh.supabase.co";
const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpqcXJ0dXBvc2RyaW16am95ZGdoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMzE5MDMsImV4cCI6MjA5MzkwNzkwM30.dLvc0pPrfIXiBGJSDTnRtNU6FRppFPSr86pLwHD35j4";
const HEADERS = { "apikey": ANON_KEY, "Authorization": `Bearer ${ANON_KEY}` };
const PLAY_URL = "https://play.google.com/store/apps/details?id=com.gianlucadelfini.renttrack";

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

async function init() {
  if (!id) { showLanding(); return; }
  try {
    const [lr, pr] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/listings?id=eq.${encodeURIComponent(id)}&select=*`, { headers: HEADERS }),
      fetch(`${SUPABASE_URL}/rest/v1/listing_photos?listing_id=eq.${encodeURIComponent(id)}&order=display_order.asc`, { headers: HEADERS })
    ]);
    const listings = await lr.json();
    const photos = await pr.json();
    if (!listings || listings.length === 0) { show(renderUnavailable()); return; }
    const l = listings[0];
    if (!l.is_active) { show(renderUnavailable()); return; }
    document.title = `${l.title} — RentTrack`;
    show(renderListing(l, photos || []));
  } catch(e) {
    show(renderError("Errore nel caricamento dell'annuncio."));
  }
}

function show(html) {
  document.getElementById("loading").classList.add("hidden");
  const app = document.getElementById("app");
  app.classList.remove("hidden");
  app.innerHTML = html;
}

/* ── LISTING RENDER ── */
function renderListing(l, photos) {
  const cover = photos.find(p => p.is_cover)?.url || photos[0]?.url || "";
  const price = l.price_monthly ? `€${Math.round(Math.abs(l.price_monthly)).toLocaleString("it-IT")}/mese` : "";
  const loc = [l.city, l.zone].filter(Boolean).join(" · ");
  const extraPhotos = photos.length > 1 ? photos.slice(1, 7) : [];

  const chips = [
    l.sqm      ? `📐 ${l.sqm} m²` : null,
    l.rooms    ? `🛏 ${l.rooms} ${l.rooms===1?"camera":"camere"}` : null,
    l.bathrooms? `🚿 ${l.bathrooms} ${l.bathrooms===1?"bagno":"bagni"}` : null,
    l.floor    ? `🏢 Piano ${l.floor}` : null,
    l.furnished? "🛋 Arredato" : null,
  ].filter(Boolean).map(c=>`<span class="chip">${c}</span>`).join("");

  const availChip = l.is_available===false
    ? `<span class="chip chip-no">🔒 Occupato</span>`
    : `<span class="chip chip-ok">✅ Disponibile</span>`;

  const gallery = extraPhotos.length > 0
    ? `<div class="gallery">${extraPhotos.map(p=>
        `<img src="${esc(p.url)}" loading="lazy" onclick="openLightbox('${esc(p.url)}')" alt="foto"/>`
      ).join("")}</div>`
    : "";

  const desc = l.description
    ? `<div class="l-card" style="animation-delay:.1s">
         <div class="l-card-title">📋 Descrizione</div>
         <p class="l-desc">${esc(l.description)}</p>
       </div>`
    : "";

  const phoneBtns = [];
  if (l.contact_phone)    phoneBtns.push({type:"phone",href:`tel:${l.contact_phone}`,label:"Chiama",cls:"l-btn-phone"});
  if (l.contact_whatsapp) phoneBtns.push({type:"wa",href:`https://wa.me/${l.contact_whatsapp.replace(/\D/g,"")}`,label:"WhatsApp",cls:"l-btn-wa"});
  if (l.contact_email)    phoneBtns.push({type:"email",href:`mailto:${l.contact_email}`,label:"Email",cls:"l-btn-email"});

  const icons = {phone:"📞",wa:"💬",email:"✉️"};

  const contactCard = phoneBtns.length
    ? `<div class="l-card" style="animation-delay:.2s">
         <div class="l-card-title">📬 Contatta il proprietario</div>
         <div class="l-contacts">${phoneBtns.map(b=>`<a class="l-btn ${b.cls}" href="${b.href}">${icons[b.type]} ${b.label}</a>`).join("")}</div>
       </div>`
    : "";

  const stickyBtns = phoneBtns.slice(0,2).map(b=>
    `<a class="l-sticky-btn ${b.cls}" href="${b.href}">${icons[b.type]} ${b.label}</a>`
  ).join("");
  const stickyBar = stickyBtns ? `<div class="l-sticky">${stickyBtns}</div>` : "";

  const photoBadge = photos.length > 1
    ? `<div class="photo-badge">📷 ${photos.length} foto</div>`
    : "";

  return `
    ${cover
      ? `<div class="l-hero"><img src="${esc(cover)}" alt="${esc(l.title)}"/><div class="l-hero-overlay"></div>${photoBadge}</div>`
      : `<div class="l-hero-placeholder">🏠</div>`}
    <div class="l-content">
      ${price ? `<p class="l-price">${price}</p>` : ""}
      <h1 class="l-title">${esc(l.title)}</h1>
      ${loc ? `<p class="l-location">📍 ${esc(loc)}</p>` : ""}
      ${l.available_from ? `<p class="l-avail">📅 Disponibile dal <strong>${esc(l.available_from)}</strong></p>` : ""}
      <div class="chips">${chips}${availChip}</div>
      ${gallery}
      ${desc}
      ${contactCard}
      <div class="l-branding">
        <p class="l-brand-logo">🏠 RentTrack</p>
        <p class="l-brand-sub">L'app italiana per gestire affitti semplicemente</p>
        <a class="l-brand-cta" href="${PLAY_URL}" target="_blank">📲 Scarica gratis su Android</a>
      </div>
    </div>
    ${stickyBar}`;
}

    <div class="l-center-icon">🏚️</div>
    <h1>Annuncio non disponibile</h1>

      <a class="l-brand-cta" href="${PLAY_URL}" target="_blank">📲 Scarica gratis</a>
    </div>
  </div>`;
}

function renderError(msg) {
  return `<div class="l-center">
    <div class="l-center-icon">⚠️</div>
    <h1>Qualcosa è andato storto</h1>
    <p>${esc(msg)}</p>

}
