<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0A1628"/>
<meta name="description" content="RentTrack - La app italiana per gestire affitti, cedolini e pubblicare annunci. Scarica gratis su Android."/>
<title>RentTrack — Gestione Affitti</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0A1628;color:#E2E8F0;min-height:100vh}
a{text-decoration:none;color:inherit}

/* Loading */
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px}
.spinner{width:40px;height:40px;border:3px solid #1E3A5F;border-top:3px solid #67E8F9;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:#94A3B8;font-size:14px}

/* Hidden */
.hidden{display:none!important}

/* Hero */
.hero{position:relative;width:100%;height:280px;overflow:hidden;background:linear-gradient(135deg,#1A2744,#0D1B2A)}
.hero img{width:100%;height:100%;object-fit:cover}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 30%,#0A1628 100%)}
.hero-placeholder{width:100%;height:220px;display:flex;align-items:center;justify-content:center;font-size:90px;background:linear-gradient(135deg,#1A2744,#0D1B2A)}

/* Content */
.content{padding:16px 16px 60px;max-width:620px;margin:0 auto}

.price{font-size:30px;font-weight:900;color:#67E8F9;margin-bottom:6px;letter-spacing:-0.5px}
h1{font-size:21px;font-weight:700;color:#F1F5F9;line-height:1.3;margin-bottom:8px}
.location{color:#94A3B8;font-size:14px;margin-bottom:6px;display:flex;align-items:center;gap:4px}
.avail-from{color:#94A3B8;font-size:13px;margin-bottom:14px}

/* Chips */
.chips{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0 20px}
.chip{background:#112240;border:1px solid #1E3A5F;border-radius:20px;padding:6px 14px;font-size:13px;color:#CBD5E1;white-space:nowrap}
.chip-available{border-color:#6EE7B7;color:#6EE7B7}
.chip-occupied{border-color:#F87171;color:#F87171}

/* Gallery */
.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:20px;border-radius:12px;overflow:hidden}
.gallery img{width:100%;aspect-ratio:1;object-fit:cover;cursor:pointer;transition:opacity 0.2s}
.gallery img:hover{opacity:0.85}

/* Cards */
.card{background:#112240;border:1px solid #1E3A5F;border-radius:16px;padding:18px;margin-bottom:14px}
.card-title{font-size:15px;font-weight:700;color:#67E8F9;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.desc-text{color:#CBD5E1;font-size:14px;line-height:1.7;white-space:pre-wrap}

/* Contact buttons */
.contacts{display:flex;flex-direction:column;gap:10px}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:15px;border-radius:14px;font-size:15px;font-weight:700;text-align:center;transition:transform 0.15s,opacity 0.15s}
.btn:active{transform:scale(0.97);opacity:0.85}
.btn-phone{background:#1B4332;color:#6EE7B7;border:1px solid #6EE7B7}
.btn-wa{background:#14532D;color:#86EFAC;border:1px solid #86EFAC}
.btn-email{background:#1E3A5F;color:#67E8F9;border:1px solid #67E8F9}

/* Branding */
.branding{margin-top:28px;text-align:center;padding:16px;background:#112240;border-radius:16px;border:1px solid #1E3A5F;display:flex;flex-direction:column;gap:6px}
.branding-main{font-size:15px;font-weight:600}
.branding-main a{color:#67E8F9}
.branding-sub{color:#64748B;font-size:12px}
.branding-cta{display:inline-block;margin-top:6px;padding:10px 20px;background:linear-gradient(135deg,#0EA5E9,#6366F1);color:#fff;border-radius:10px;font-size:13px;font-weight:700}

/* Unavailable / Error */
.center-page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px;gap:16px}
.big-icon{font-size:80px}
.center-page h1{font-size:22px;color:#F1F5F9}
.center-page p{color:#94A3B8;font-size:15px;max-width:300px;line-height:1.5}

/* Lightbox */
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:999;align-items:center;justify-content:center}
#lightbox.open{display:flex}
#lightbox img{max-width:95vw;max-height:90vh;object-fit:contain;border-radius:8px}
#lightbox-close{position:absolute;top:16px;right:20px;font-size:32px;color:#fff;cursor:pointer;line-height:1}

/* Landing page premium */
.landing{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:48px 24px 40px;text-align:center;overflow:hidden;font-family:'Inter',sans-serif}

/* Animated background orbs */
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.15;animation:float 8s ease-in-out infinite}
.orb1{width:400px;height:400px;background:#6366F1;top:-100px;left:-100px;animation-delay:0s}
.orb2{width:350px;height:350px;background:#0EA5E9;bottom:-80px;right:-80px;animation-delay:-3s}
.orb3{width:200px;height:200px;background:#8B5CF6;top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:-5s}
@keyframes float{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-20px) scale(1.05)}}
.orb3{animation:float2 6s ease-in-out infinite}
@keyframes float2{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-60%) scale(1.1)}}

/* Content wrapper */
.landing-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:0;max-width:380px;width:100%}

/* Badge */
.landing-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;color:#A5B4FC;margin-bottom:20px;animation:fadeUp 0.5s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* Logo + brand */
.landing-icon{font-size:64px;margin-bottom:10px;animation:fadeUp 0.5s ease 0.1s both;filter:drop-shadow(0 0 30px rgba(103,232,249,0.4))}
.landing-brand{font-size:38px;font-weight:900;background:linear-gradient(135deg,#67E8F9 0%,#818CF8 50%,#C084FC 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-1.5px;line-height:1;margin-bottom:6px;animation:fadeUp 0.5s ease 0.15s both}
.landing-sub{font-size:13px;font-weight:600;color:#6366F1;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;animation:fadeUp 0.5s ease 0.2s both}
.landing-tagline{color:#94A3B8;font-size:16px;line-height:1.6;margin-bottom:10px;animation:fadeUp 0.5s ease 0.25s both}

/* Rating */
.landing-rating{display:inline-flex;align-items:center;gap:6px;margin-bottom:32px;animation:fadeUp 0.5s ease 0.3s both}
.stars{color:#FBBF24;font-size:15px;letter-spacing:1px}
.rating-text{color:#64748B;font-size:13px}

/* Feature cards */
.landing-features{display:flex;flex-direction:column;gap:10px;width:100%;margin-bottom:32px;animation:fadeUp 0.5s ease 0.35s both}
.feat{display:flex;align-items:center;gap:14px;background:rgba(17,34,64,0.7);backdrop-filter:blur(12px);border:1px solid rgba(103,232,249,0.1);border-radius:16px;padding:14px 16px;text-align:left;transition:border-color 0.2s,transform 0.2s}
.feat:hover{border-color:rgba(103,232,249,0.3);transform:translateX(4px)}
.feat-icon{font-size:26px;flex-shrink:0;width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:rgba(99,102,241,0.12);border-radius:12px}
.feat-text strong{color:#F1F5F9;display:block;font-size:14px;font-weight:700;margin-bottom:2px}
.feat-text span{color:#64748B;font-size:13px;line-height:1.4}

/* CTA */
.landing-cta{position:relative;display:inline-flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:18px 28px;background:linear-gradient(135deg,#0EA5E9,#6366F1,#8B5CF6);color:#fff;border-radius:18px;font-size:16px;font-weight:800;text-decoration:none;box-shadow:0 8px 32px rgba(99,102,241,0.4);transition:transform 0.15s,box-shadow 0.15s;overflow:hidden;margin-bottom:16px;animation:fadeUp 0.5s ease 0.4s both}
.landing-cta::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);transform:translateX(-100%);animation:shimmer 2.5s infinite 1s}
@keyframes shimmer{to{transform:translateX(100%)}}
.landing-cta:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(99,102,241,0.5)}
.landing-cta:active{transform:scale(0.98)}
.cta-icon{font-size:20px}

/* Footer */
.landing-footer{color:#334155;font-size:12px;animation:fadeUp 0.5s ease 0.45s both}
.landing-footer a{color:#475569;text-decoration:underline}

</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p class="loading-text">Caricamento annuncio...</p>
</div>

<div id="app" class="hidden"></div>

<div id="lightbox" onclick="closeLightbox()">
  <span id="lightbox-close">✕</span>
  <img id="lightbox-img" src="" alt="foto"/>
</div>

<script>
const SUPABASE_URL = "https://zjqrtuposdrimzjoydgh.supabase.co";
const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpqcXJ0dXBvc2RyaW16am95ZGdoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMzE5MDMsImV4cCI6MjA5MzkwNzkwM30.dLvc0pPrfIXiBGJSDTnRtNU6FRppFPSr86pLwHD35j4";
const HEADERS = { "apikey": ANON_KEY, "Authorization": `Bearer ${ANON_KEY}` };
const PLAY_URL = "https://play.google.com/store/apps/details?id=com.gianlucadelfini.renttrack";

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

async function init() {
  if (!id) { showLanding(); return; }
  try {
    const [lr, pr] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/listings?id=eq.${encodeURIComponent(id)}&select=*`, { headers: HEADERS }),
      fetch(`${SUPABASE_URL}/rest/v1/listing_photos?listing_id=eq.${encodeURIComponent(id)}&order=display_order.asc`, { headers: HEADERS })
    ]);
    const listings = await lr.json();
    const photos = await pr.json();

    if (!listings || listings.length === 0) { show(renderUnavailable()); return; }
    const l = listings[0];
    if (!l.is_active) { show(renderUnavailable()); return; }

    document.title = `${l.title} — RentTrack`;
    show(renderListing(l, photos || []));
  } catch (e) {
    show(renderError("Errore nel caricamento."));
  }
}

function show(html) {
  document.getElementById("loading").classList.add("hidden");
  const app = document.getElementById("app");
  app.classList.remove("hidden");
  app.innerHTML = html;
}

function renderListing(l, photos) {
  const cover = photos.find(p => p.is_cover)?.url || photos[0]?.url || "";
  const price = l.price_monthly ? `€${Math.abs(Math.round(l.price_monthly)).toLocaleString("it-IT")}/mese` : "";
  const loc = [l.city, l.zone].filter(Boolean).join(" · ");

  const chips = [
    l.sqm ? `📐 ${l.sqm} m²` : null,
    l.rooms ? `🛏 ${l.rooms} ${l.rooms === 1 ? "camera" : "camere"}` : null,
    l.bathrooms ? `🚿 ${l.bathrooms} ${l.bathrooms === 1 ? "bagno" : "bagni"}` : null,
    l.floor ? `🏢 Piano ${l.floor}` : null,
    l.furnished ? "🛋 Arredato" : null,
  ].filter(Boolean).map(c => `<span class="chip">${c}</span>`).join("");

  const availChip = l.is_available === false
    ? `<span class="chip chip-occupied">🔒 Occupato</span>`
    : `<span class="chip chip-available">✅ Disponibile</span>`;

  const gallery = photos.length > 1
    ? `<div class="gallery">${photos.slice(1, 7).map(p =>
        `<img src="${esc(p.url)}" loading="lazy" onclick="openLightbox('${esc(p.url)}')" alt="foto"/>`
      ).join("")}</div>`
    : "";

  const desc = l.description
    ? `<div class="card"><div class="card-title">📋 Descrizione</div><p class="desc-text">${esc(l.description)}</p></div>`
    : "";

  const contacts = [
    l.contact_phone ? `<a class="btn btn-phone" href="tel:${l.contact_phone}">📞 Chiama</a>` : null,
    l.contact_whatsapp ? `<a class="btn btn-wa" href="https://wa.me/${l.contact_whatsapp.replace(/\D/g,"")}">💬 WhatsApp</a>` : null,
    l.contact_email ? `<a class="btn btn-email" href="mailto:${l.contact_email}">✉️ Email</a>` : null,
  ].filter(Boolean).join("");

  const contactCard = contacts
    ? `<div class="card"><div class="card-title">📬 Contatta il proprietario</div><div class="contacts">${contacts}</div></div>`
    : "";

  return `
    ${cover
      ? `<div class="hero"><img src="${esc(cover)}" alt="${esc(l.title)}"/><div class="hero-overlay"></div></div>`
      : `<div class="hero-placeholder">🏠</div>`}
    <div class="content">
      ${price ? `<p class="price">${price}</p>` : ""}
      <h1>${esc(l.title)}</h1>
      ${loc ? `<p class="location">📍 ${esc(loc)}</p>` : ""}
      ${l.available_from ? `<p class="avail-from">📅 Disponibile dal <strong>${esc(l.available_from)}</strong></p>` : ""}
      <div class="chips">${chips}${availChip}</div>
      ${gallery}
      ${desc}
      ${contactCard}
      <div class="branding">
        <p class="branding-main">🏠 Creato con <a href="${PLAY_URL}" target="_blank">RentTrack</a></p>
        <p class="branding-sub">Gestisci i tuoi affitti in modo semplice</p>
        <a class="branding-cta" href="${PLAY_URL}" target="_blank">📲 Scarica gratis su Android</a>
      </div>
    </div>`;
}

function renderUnavailable() {
  return `<div class="center-page">
    <div class="big-icon">🏚️</div>
    <h1>Annuncio non più disponibile</h1>
    <p>Questo annuncio è stato disattivato dal proprietario.</p>
    <div class="branding" style="max-width:320px;width:100%">
      <p class="branding-main">🏠 <a href="${PLAY_URL}" target="_blank">RentTrack</a></p>
      <p class="branding-sub">Gestisci i tuoi affitti in modo semplice</p>
      <a class="branding-cta" href="${PLAY_URL}" target="_blank">📲 Scarica gratis</a>
    </div>
  </div>`;
}

function renderError(msg) {
  return `<div class="center-page">
    <div class="big-icon">⚠️</div>
    <h1>Qualcosa è andato storto</h1>
    <p>${esc(msg)}</p>
  </div>`;
}

function esc(s) {
  return (s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function openLightbox(url) {
  document.getElementById("lightbox-img").src = url;
  document.getElementById("lightbox").classList.add("open");
}
function closeLightbox() {
  document.getElementById("lightbox").classList.remove("open");
}

function showLanding() {
  document.getElementById("loading").classList.add("hidden");
  const app = document.getElementById("app");
  app.classList.remove("hidden");
  app.innerHTML = `
    <div class="landing">
      <div class="orb orb1"></div>
      <div class="orb orb2"></div>
      <div class="orb orb3"></div>
      <div class="landing-inner">
        <div class="landing-badge">✨ App per proprietari immobiliari</div>
        <div class="landing-icon">🏠</div>
        <div class="landing-brand">RentTrack</div>
        <div class="landing-sub">Gestione Affitti</div>
        <p class="landing-tagline">La app italiana per gestire inquilini, cedolini e pubblicare annunci in modo semplice</p>
        <div class="landing-rating">
          <span class="stars">★★★★★</span>
          <span class="rating-text">Disponibile su Android</span>
        </div>
        <div class="landing-features">
          <div class="feat">
            <div class="feat-icon">📋</div>
            <div class="feat-text">
              <strong>Cedolini & Pagamenti</strong>
              <span>Tieni traccia di morosità, scadenze e pagamenti</span>
            </div>
          </div>
          <div class="feat">
            <div class="feat-icon">📢</div>
            <div class="feat-text">
              <strong>Annunci con QR Code</strong>
              <span>Condividi link e QR con i potenziali inquilini</span>
            </div>
          </div>
          <div class="feat">
            <div class="feat-icon">📊</div>
            <div class="feat-text">
              <strong>Report & Export</strong>
              <span>Bilancio entrate/uscite, CSV e storico inquilini</span>
            </div>
          </div>
        </div>
        <a class="landing-cta" href="${PLAY_URL}" target="_blank">
          <span class="cta-icon">📲</span>
          Scarica gratis su Google Play
        </a>
        <div class="landing-footer">Gratuito · Versione Pro disponibile · <a href="/privacy">Privacy Policy</a></div>
      </div>
    </div>`;
}

init();
</script>
</body>
</html>
